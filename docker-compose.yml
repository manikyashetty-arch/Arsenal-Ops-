version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: arsenal-ops-db
    environment:
      POSTGRES_USER: arsenalops
      POSTGRES_PASSWORD: arsenal_ops_secret
      POSTGRES_DB: arsenalops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U arsenalops" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arsenal-ops-api
    environment:
      - DATABASE_URL=postgresql://arsenalops:arsenal_ops_secret@postgres:5432/arsenalops
      # SECRET_KEY signs session JWTs AND the OAuth state token.
      # REQUIRED — _load_secret_key() raises at import if absent. Set in
      # .env locally (generate with
      # `python -c "import secrets; print(secrets.token_urlsafe(48))"`).
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      # Email notifications (Gmail API + OAuth2)
      - MAIL_REFRESH_TOKEN=${MAIL_REFRESH_TOKEN}
      - BOT_EMAIL=${BOT_EMAIL}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - FRONTEND_URL=${FRONTEND_URL}
      # QuickBooks / Workforce integration. The first five are required for
      # Connect + Sync to work; the rest are optional overrides used in
      # sandbox / testing.
      - INTUIT_CLIENT_ID=${INTUIT_CLIENT_ID}
      - INTUIT_CLIENT_SECRET=${INTUIT_CLIENT_SECRET}
      - INTUIT_REDIRECT_URI=${INTUIT_REDIRECT_URI}
      - INTUIT_API_BASE_URL=${INTUIT_API_BASE_URL}
      - WORKFORCE_TOKEN_ENCRYPTION_KEY=${WORKFORCE_TOKEN_ENCRYPTION_KEY}
      - INTUIT_OAUTH_BASE_URL=${INTUIT_OAUTH_BASE_URL}
      - INTUIT_TOKEN_URL=${INTUIT_TOKEN_URL}
      - INTUIT_REVOKE_URL=${INTUIT_REVOKE_URL}
      - WORKFORCE_POST_OAUTH_REDIRECT=${WORKFORCE_POST_OAUTH_REDIRECT}
      - WORKFORCE_SYNC_BATCH_CAP=${WORKFORCE_SYNC_BATCH_CAP}
      - WORKFORCE_SYNC_LOG_LEVEL=${WORKFORCE_SYNC_LOG_LEVEL}
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # React Frontend
  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: arsenal-ops-ui
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
