# Pre-commit hooks: catch format / lint / secrets before they reach CI.
# Install once per clone with `pre-commit install` (or `just precommit-install`).
# ruff is pinned to the same version as backend/requirements.txt so local and CI
# agree.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, typescript, jsx, tsx, json, css, markdown]
        exclude: 'app/package-lock\.json|backend/.venv|app/src/client/.*|.*\.min\.(js|css)'
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
