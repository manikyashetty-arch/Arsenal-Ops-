services:
  # Backend API Service
  - type: web
    name: arsenal-ops-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 300 --graceful-timeout 30
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: productmind-db
          property: connectionString
      - key: AZURE_OPENAI_API_KEY
        sync: false # Set manually in Render dashboard
      - key: AZURE_OPENAI_ENDPOINT
        sync: false # Set manually in Render dashboard
      - key: AZURE_OPENAI_DEPLOYMENT_NAME
        value: gpt-4o
      - key: GITHUB_TOKEN
        sync: false # Set manually in Render dashboard (optional)
      - key: SMTP_HOST
        sync: false # Set manually for email notifications (optional)
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        value: "https://your-app-name.vercel.app,https://your-custom-domain.com"

  # PostgreSQL Database
  - type: psql
    name: arsenal-ops-db
    env: python
    region: oregon
    plan: free
    ipAllowList: [] # Allow all connections

# Alternative: Use Supabase or Neon for database (recommended for free tier)
# They offer more generous free tiers than Render's PostgreSQL
