services:
  # Backend API Service
  - type: web
    name: arsenal-ops-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    # TODO(perf B6): bump --workers 1 → --workers 2 once this service moves off
    # the Render free tier. The Starter plan (>= 512 MB sustained) gives each
    # gunicorn worker enough RAM headroom; on the free tier (~256 MB) a second
    # worker will reliably OOM under modest concurrency. uvicorn[standard] is
    # already pinned in requirements.txt so uvloop + httptools are picked up
    # automatically by UvicornWorker — no requirements.txt change needed when
    # the worker count is increased.
    startCommand: gunicorn main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 300 --graceful-timeout 30
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: productmind-db
          property: connectionString
      # REQUIRED: JWT signing secret. The app refuses to boot if unset or left at
      # the legacy default. Generate with:
      #   python -c "import secrets; print(secrets.token_urlsafe(48))"
      # Rotating it invalidates all live sessions (forces re-login).
      - key: SECRET_KEY
        sync: false # Set manually in Render dashboard
      - key: OPENAI_API_KEY
        sync: false # Set manually in Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: GITHUB_TOKEN
        sync: false # Set manually in Render dashboard (optional)
      # Email notifications (Gmail API + OAuth2). Secrets set in the dashboard.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: MAIL_REFRESH_TOKEN
        sync: false # OAuth2 refresh token for the bot mailbox
      - key: BOT_EMAIL
        value: DoNotReply@arsenalai.com # sender + authorized account
      - key: SMTP_FROM_NAME
        value: Arsenal Ops # From display name
      - key: CORS_ORIGINS
        value: "https://your-app-name.vercel.app,https://your-custom-domain.com"
      # MCP server OAuth (Claude Desktop / claude.ai connectors). The /mcp endpoint
      # always accepts the app's Bearer JWT; OAuth is opt-in. Leave OFF until the
      # MCP redirect URI (<MCP_BASE_URL>/auth/callback) is registered in the Google
      # OAuth client above. Flip MCP_OAUTH_ENABLED to "1" in the dashboard to enable.
      - key: MCP_OAUTH_ENABLED
        value: "0"
      - key: MCP_BASE_URL
        sync: false # Set to https://<render-host>/mcp in the dashboard

  # PostgreSQL Database
  - type: psql
    name: arsenal-ops-db
    env: python
    region: oregon
    plan: free
    ipAllowList: [] # Allow all connections

# Alternative: Use Supabase or Neon for database (recommended for free tier)
# They offer more generous free tiers than Render's PostgreSQL
