# Lint workflow — runs Ruff (Python) and ESLint + Prettier (frontend) on every
# pull request and push to main.
#
# Loud but not blocking: any lint failure fails the workflow, so the PR check
# shows red. Merging is gated by *branch protection settings*, not this file.
# As long as "Lint" is NOT in the required-status-checks list for `main`, a
# red workflow is visible feedback but does not block merge.
#
# To flip to strict enforcement once the baseline is clean: add "Lint" to
# the required-status-checks list under
#   Repo → Settings → Branches → Branch protection rules → main
# No workflow file change needed.

name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    name: Python (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install ruff
        run: uv tool install ruff

      - name: ruff check
        run: uv tool run ruff check backend/

      - name: ruff format --check
        run: uv tool run ruff format --check backend/

  frontend:
    name: Frontend (ESLint + Prettier)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check
