# Test workflow — runs typecheck and unit tests for backend (pytest) and frontend
# (vitest) on every pull request and push to main.
#
# All jobs run in parallel. Coverage artifacts are uploaded for manual review.
# Codecov integration will be added in a later phase (requires token setup).
#
# To enforce these checks: add the job names (typecheck-backend, typecheck-frontend,
# unit-backend, unit-frontend) to the required-status-checks list under
#   Repo → Settings → Branches → Branch protection rules → main
# No workflow file change needed after that.

name: Test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-backend:
    name: Typecheck (Backend)
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Check Python imports
        # TODO: Replace with mypy once added to requirements.txt in week 2.
        # For now, a basic import check catches obvious syntax and module errors.
        # Run from backend/ so the sys.path.append("..") pattern in routers/ resolves.
        run: python -c "import main"
        working-directory: backend

  typecheck-frontend:
    name: Typecheck (Frontend)
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: app

  unit-backend:
    name: Unit Tests (Backend)
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Copy test env
        run: cp .env.test .env || true
        working-directory: backend

      - name: Run pytest
        run: python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term
        working-directory: backend

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  unit-frontend:
    name: Unit Tests (Frontend)
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Run vitest
        run: npm run test -- --coverage
        working-directory: app

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: app/coverage/
          if-no-files-found: ignore
